<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARENA FPS — PVP LOBBY</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  #bg-canvas {
    position: fixed; inset: 0; z-index: 0; opacity: 0.12;
  }

  .lobby-wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 0;
    animation: fadeIn 0.5s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lobby-title {
    font-size: 32px; font-weight: 900;
    letter-spacing: 10px; text-transform: uppercase;
    color: #44aaff; margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(68,170,255,0.5);
  }

  .lobby-sub {
    font-size: 10px; letter-spacing: 4px;
    color: rgba(255,255,255,0.3); text-transform: uppercase;
    margin-bottom: 48px;
  }

  .lobby-label {
    font-size: 11px; letter-spacing: 3px;
    color: rgba(255,255,255,0.5); text-transform: uppercase;
    margin-bottom: 14px;
  }

  .code-inputs {
    display: flex; gap: 12px; margin-bottom: 32px;
  }

  .code-inputs input {
    width: 56px; height: 68px;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(68,170,255,0.3);
    border-radius: 8px;
    color: #fff; font-family: 'Courier New', monospace;
    font-size: 32px; font-weight: bold;
    text-align: center; letter-spacing: 2px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: #44aaff;
  }

  .code-inputs input:focus {
    border-color: #44aaff;
    box-shadow: 0 0 16px rgba(68,170,255,0.3);
    background: rgba(68,170,255,0.06);
  }

  .code-inputs input::placeholder {
    color: rgba(255,255,255,0.15);
    font-size: 24px;
  }

  .join-btn {
    background: transparent;
    border: 1px solid rgba(68,170,255,0.5);
    color: #44aaff;
    font-family: 'Courier New', monospace;
    font-size: 14px; letter-spacing: 4px;
    text-transform: uppercase;
    padding: 16px 56px; cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }

  .join-btn:hover {
    background: rgba(68,170,255,0.08);
    border-color: #44aaff;
    box-shadow: 0 0 20px rgba(68,170,255,0.2);
    color: #fff;
  }

  .join-btn:active { transform: scale(0.97); }

  .join-btn:disabled {
    opacity: 0.3; cursor: not-allowed;
    box-shadow: none;
  }

  .back-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 28px; cursor: pointer;
    transition: all 0.2s;
  }

  .back-btn:hover {
    border-color: rgba(255,255,255,0.5);
    color: rgba(255,255,255,0.8);
  }

  .status-msg {
    font-size: 11px; letter-spacing: 3px;
    color: rgba(255,255,255,0.4); text-transform: uppercase;
    margin-top: 24px; height: 20px;
    transition: color 0.3s;
  }

  .status-msg.waiting {
    color: #ffcc00;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .status-msg.error {
    color: #ff4444;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Spinner */
  .spinner {
    display: none; margin-top: 16px;
    width: 32px; height: 32px;
    border: 3px solid rgba(68,170,255,0.3);
    border-top-color: #44aaff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="lobby-wrap">
  <div class="lobby-title">PVP Lobby</div>
  <div class="lobby-sub">Enter a 4-digit room code to match with a friend</div>

  <div class="lobby-label">Room Code</div>
  <div class="code-inputs">
    <input type="text" maxlength="1" id="c0" placeholder="·" inputmode="numeric" autocomplete="off">
    <input type="text" maxlength="1" id="c1" placeholder="·" inputmode="numeric" autocomplete="off">
    <input type="text" maxlength="1" id="c2" placeholder="·" inputmode="numeric" autocomplete="off">
    <input type="text" maxlength="1" id="c3" placeholder="·" inputmode="numeric" autocomplete="off">
  </div>

  <button class="join-btn" id="join-btn" disabled>Join Match</button>
  <button class="back-btn" id="back-btn">← Back to Menu</button>

  <div class="status-msg" id="status-msg"></div>
  <div class="spinner" id="spinner"></div>
</div>

<script>
// ── Code input handling ───────────────────────────────────────────────────
const inputs = [
  document.getElementById('c0'),
  document.getElementById('c1'),
  document.getElementById('c2'),
  document.getElementById('c3'),
];
const joinBtn  = document.getElementById('join-btn');
const statusEl = document.getElementById('status-msg');
const spinner  = document.getElementById('spinner');

function getCode() {
  return inputs.map(i => i.value).join('');
}

function updateJoinBtn() {
  const code = getCode();
  joinBtn.disabled = code.length !== 4 || !/^\d{4}$/.test(code);
}

inputs.forEach((inp, idx) => {
  inp.addEventListener('input', () => {
    // Only allow digits
    inp.value = inp.value.replace(/[^0-9]/g, '');
    if (inp.value.length === 1 && idx < 3) {
      inputs[idx + 1].focus();
    }
    updateJoinBtn();
  });

  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && inp.value === '' && idx > 0) {
      inputs[idx - 1].focus();
      inputs[idx - 1].value = '';
      updateJoinBtn();
    }
    if (e.key === 'Enter') {
      joinBtn.click();
    }
  });

  // Allow paste of full 4-digit code
  inp.addEventListener('paste', (e) => {
    e.preventDefault();
    const pasted = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g, '').slice(0, 4);
    for (let i = 0; i < 4; i++) {
      inputs[i].value = pasted[i] || '';
    }
    if (pasted.length === 4) inputs[3].focus();
    updateJoinBtn();
  });
});

// Auto-focus first input
inputs[0].focus();

// ── Back button ───────────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  window.location.href = '../menu/menu.html';
});

// ── Join button ───────────────────────────────────────────────────────────
joinBtn.addEventListener('click', () => {
  const code = getCode();
  if (code.length !== 4) return;

  // Store room code and navigate to arena immediately
  // The arena page will connect to server and wait for opponent there
  localStorage.setItem('pvpRoomCode', code);
  statusEl.textContent = 'LOADING ARENA...';
  statusEl.className = 'status-msg';
  statusEl.style.color = '#44ff88';
  spinner.style.display = 'block';

  setTimeout(() => {
    window.location.href = 'index.html';
  }, 300);
});

// ── Background animation ──────────────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let offset = 0;
function drawBG() {
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(68,170,255,0.4)';
  ctx.lineWidth = 0.5;
  const GRID = 52;
  for (let x = (offset % GRID) - GRID; x < W + GRID; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = (offset % GRID) - GRID; y < H + GRID; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  offset += 0.3;
  requestAnimationFrame(drawBG);
}
drawBG();
</script>
</body>
</html>
